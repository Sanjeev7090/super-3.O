version: "3.9"

# ─── Dreamer V3 Robo-Trader — Docker Compose ─────────────────────────────────
# Services: backend · frontend · mongodb · redis (optional)
#
# Quick start:
#   cp .env.example .env          # fill in your values
#   docker compose up -d
#   open http://localhost:3000
#
# Stop:
#   docker compose down
#
# Wipe data:
#   docker compose down -v
#
# DISCLAIMER: Paper Trading default. No guaranteed returns. Use at your own risk.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: robo_mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-changeme}
    ports:
      - "27017:27017"
    networks:
      - robo_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis (rate limiter + session cache) ──────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: robo_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-changeme}
    ports:
      - "6379:6379"
    networks:
      - robo_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: robo_backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-changeme}@mongodb:27017/${DB_NAME:-trading_db}?authSource=admin
      DB_NAME: ${DB_NAME:-trading_db}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-}
      GROWW_API_KEY: ${GROWW_API_KEY:-}
      GROWW_API_SECRET: ${GROWW_API_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-false}
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8001:8001"
    networks:
      - robo_net
    volumes:
      - backend_logs:/app/backend/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Frontend (React → Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
    container_name: robo_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - robo_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  backend_logs:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  robo_net:
    driver: bridge
